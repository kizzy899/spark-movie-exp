<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>电影实时评分分析</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body { margin: 0; background: #0d1117; font-family: Arial, sans-serif; }
        h1 { text-align: center; color: #e6edf3; padding: 20px 0 0; font-size: 22px; }
        p.sub { text-align: center; color: #8b949e; font-size: 13px; margin: 4px 0 10px; }
        #chart { width: 100%; height: 520px; }
        #status { text-align: center; color: #3fb950; font-size: 13px; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🎬 电影实时评分折线图</h1>
    <p class="sub">基于 Spark Streaming 实时分析 · 每5秒自动更新</p>
    <div id="status">等待数据中...</div>
    <div id="chart"></div>

    <script>
        const chart = echarts.init(document.getElementById('chart'));

        const colors = ['#ff7c7c','#7ec8e3','#a8e6cf','#ffd93d','#c3b1e1'];

        function buildOption(data) {
            const series = Object.entries(data.movies).map(([title, values], i) => ({
                name: title,
                type: 'line',
                smooth: true,
                symbol: 'circle',
                symbolSize: 6,
                lineStyle: { width: 2, color: colors[i % colors.length] },
                itemStyle: { color: colors[i % colors.length] },
                data: values,
                connectNulls: true
            }));

            return {
                backgroundColor: '#0d1117',
                tooltip: { trigger: 'axis', backgroundColor: '#161b22', borderColor: '#30363d', textStyle: { color: '#e6edf3' } },
                legend: { data: Object.keys(data.movies), textStyle: { color: '#8b949e' }, top: 10 },
                grid: { left: '5%', right: '5%', bottom: '10%', top: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: data.times,
                    axisLabel: { color: '#8b949e', fontSize: 11, rotate: 20 },
                    axisLine: { lineStyle: { color: '#30363d' } }
                },
                yAxis: {
                    type: 'value',
                    name: '平均评分',
                    min: 0, max: 5,
                    nameTextStyle: { color: '#8b949e' },
                    axisLabel: { color: '#8b949e' },
                    splitLine: { lineStyle: { color: '#21262d' } }
                },
                series
            };
        }

        function update() {
            fetch('/api/latest')
                .then(r => r.json())
                .then(data => {
                    if (data.times.length === 0) {
                        document.getElementById('status').textContent = '暂无数据，等待 Spark Streaming 写入...';
                        return;
                    }
                    document.getElementById('status').textContent =
                        `最新批次: ${data.times[data.times.length-1]} · 共 ${data.times.length} 个批次`;
                    chart.setOption(buildOption(data));
                })
                .catch(e => console.error(e));
        }

        update();
        setInterval(update, 5000);
        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
