<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f3f4f0">
    <title>观众偏好 · 男女电影类型洞察</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        :root {
            --canvas: #f3f4f0;
            --surface: #fbfcf9;
            --surface-raised: #ffffff;
            --ink: #18231f;
            --muted: #68716c;
            --subtle: #8e9691;
            --line: #dfe3de;
            --line-strong: #cfd5cf;
            --forest: #31594b;
            --forest-soft: #dfe9e3;
            --sand: #a4886d;
            --sand-soft: #eee6de;
            --danger: #9b4d43;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 18px 50px rgba(34, 47, 41, 0.07);
        }

        * { box-sizing: border-box; }

        html { background: var(--canvas); }

        body {
            margin: 0;
            min-width: 320px;
            color: var(--ink);
            background:
                radial-gradient(circle at 90% 0%, rgba(49, 89, 75, 0.06), transparent 32rem),
                var(--canvas);
            font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; }

        button { font: inherit; }

        .shell {
            width: min(1180px, calc(100% - 48px));
            margin: 0 auto;
        }

        .site-nav {
            height: 76px;
            border-bottom: 1px solid rgba(207, 213, 207, 0.8);
        }

        .nav-inner {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 650;
            letter-spacing: -0.01em;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line-strong);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.65);
            color: var(--forest);
        }

        .brand-mark svg,
        .back-link svg,
        .status-icon svg,
        .refresh-button svg,
        .metric-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 560;
            transition: color 160ms ease;
        }

        .back-link:hover { color: var(--ink); }

        .back-link svg { width: 16px; height: 16px; }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 48px;
            padding: 72px 0 42px;
        }

        .eyebrow {
            margin: 0 0 16px;
            color: var(--forest);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 720px;
            margin: 0;
            font-size: clamp(36px, 5vw, 60px);
            font-weight: 600;
            line-height: 1.08;
            letter-spacing: -0.045em;
        }

        .hero-copy {
            max-width: 610px;
            margin: 20px 0 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.75;
        }

        .status-card {
            min-width: 210px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: rgba(251, 252, 249, 0.72);
            backdrop-filter: blur(12px);
        }

        .status-icon {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            border-radius: 11px;
            color: var(--forest);
            background: var(--forest-soft);
        }

        .status-label {
            margin: 0 0 3px;
            color: var(--subtle);
            font-size: 11px;
            font-weight: 650;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #notice {
            margin: 0;
            color: var(--ink);
            font-size: 13px;
            font-weight: 600;
        }

        #notice.error { color: var(--danger); }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 14px;
        }

        .metric {
            min-height: 138px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: rgba(251, 252, 249, 0.78);
        }

        .metric-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        .metric-icon {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 9px;
            color: var(--forest);
            background: var(--surface-raised);
        }

        .metric-icon svg { width: 16px; height: 16px; }

        .metric-value {
            margin: 18px 0 0;
            font-size: 27px;
            font-weight: 620;
            line-height: 1.15;
            letter-spacing: -0.035em;
        }

        .metric-value span {
            margin-left: 7px;
            color: var(--subtle);
            font-size: 12px;
            font-weight: 550;
            letter-spacing: 0;
        }

        .chart-card {
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: var(--surface-raised);
            box-shadow: var(--shadow);
        }

        .chart-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 14px;
        }

        .chart-kicker {
            margin: 0 0 8px;
            color: var(--subtle);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        h2 {
            margin: 0;
            font-size: 21px;
            font-weight: 620;
            letter-spacing: -0.025em;
        }

        .chart-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 560;
        }

        .legend-item { display: inline-flex; align-items: center; gap: 7px; }

        .legend-swatch {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--forest);
        }

        .legend-swatch.sand { background: var(--sand); }

        .refresh-button {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--muted);
            background: var(--surface-raised);
            cursor: pointer;
            transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .refresh-button:hover {
            color: var(--forest);
            border-color: var(--line-strong);
            transform: translateY(-1px);
        }

        .refresh-button:focus-visible,
        .back-link:focus-visible,
        .brand:focus-visible {
            outline: 3px solid rgba(49, 89, 75, 0.18);
            outline-offset: 3px;
        }

        .refresh-button.loading svg { animation: spin 900ms linear infinite; }

        #chart {
            width: 100%;
            height: 480px;
        }

        .footnote {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 18px 2px 34px;
            color: var(--subtle);
            font-size: 11px;
            line-height: 1.6;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 820px) {
            .shell { width: min(calc(100% - 30px), 680px); }
            .site-nav { height: 66px; }
            .hero {
                grid-template-columns: 1fr;
                gap: 28px;
                padding: 48px 0 32px;
            }
            .status-card { width: 100%; min-width: 0; }
            .metric { min-height: 118px; }
            .chart-card { padding: 22px 16px 18px; border-radius: 20px; }
            .chart-header { align-items: center; }
            .chart-actions { gap: 12px; }
            #chart { height: 430px; }
            .footnote { align-items: flex-start; flex-direction: column; gap: 4px; }
        }

        @media (max-width: 520px) {
            h1 { font-size: 38px; }
            .hero-copy { font-size: 14px; }
            .brand-label { display: none; }
            .chart-header { margin-bottom: 2px; }
            .chart-kicker { display: none; }
            h2 { font-size: 18px; }
            .legend { gap: 10px; }
            .refresh-button { width: 34px; height: 34px; }
            #chart { height: 500px; }
        }

        @media (max-width: 640px) {
            .metrics { grid-template-columns: 1fr; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav" aria-label="主导航">
        <div class="shell nav-inner">
            <a class="brand" href="/" aria-label="返回电影洞察首页">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M5 17V9M12 17V5M19 17v-4"/><path d="M3 20h18"/></svg>
                </span>
                <span class="brand-label">Movie Intelligence</span>
            </a>
            <a class="back-link" href="/">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                返回总览
            </a>
        </div>
    </nav>

    <main class="shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Audience intelligence · 02</p>
                <h1>看见不同观众的<br>电影偏好</h1>
                <p class="hero-copy">以性别维度对电影类型的关注人数进行对照，让共同兴趣与偏好差异清晰可见。</p>
            </div>
            <div class="status-card" role="status" aria-live="polite">
                <span class="status-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 0 3-6.25"/><path d="M4 4v5h5"/></svg>
                </span>
                <div>
                    <p class="status-label">Data status</p>
                    <p id="notice">正在同步数据</p>
                </div>
            </div>
        </header>

        <section class="metrics" aria-label="数据摘要">
            <article class="metric">
                <div class="metric-head">
                    <span>覆盖类型</span>
                    <span class="metric-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h10M4 17h13"/></svg>
                    </span>
                </div>
                <p class="metric-value" id="tag-count">—<span>个类型</span></p>
            </article>
            <article class="metric">
                <div class="metric-head">
                    <span>男性关注最高</span>
                    <span class="metric-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20c.6-4 2.6-6 6-6s5.4 2 6 6"/></svg>
                    </span>
                </div>
                <p class="metric-value" id="male-leader">—</p>
            </article>
            <article class="metric">
                <div class="metric-head">
                    <span>女性关注最高</span>
                    <span class="metric-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3"/><path d="M6 20c.6-4 2.6-6 6-6s5.4 2 6 6"/></svg>
                    </span>
                </div>
                <p class="metric-value" id="female-leader">—</p>
            </article>
        </section>

        <section class="chart-card" aria-labelledby="chart-title">
            <div class="chart-header">
                <div>
                    <p class="chart-kicker">Preference comparison</p>
                    <h2 id="chart-title">类型关注人数对比</h2>
                </div>
                <div class="chart-actions">
                    <div class="legend" aria-label="图例">
                        <span class="legend-item"><i class="legend-swatch"></i>男性</span>
                        <span class="legend-item"><i class="legend-swatch sand"></i>女性</span>
                    </div>
                    <button class="refresh-button" id="refresh-button" type="button" aria-label="刷新数据" title="刷新数据">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7v5h-5"/><path d="M19 12a7 7 0 1 0-2 5"/></svg>
                    </button>
                </div>
            </div>
            <div id="chart" role="img" aria-label="男性和女性电影类型关注人数柱状图"></div>
        </section>

        <footer class="footnote">
            <span>数据源 · Spark SQL / gender_tag_stats</span>
            <span>人数按类型与性别聚合，展示当前 Top 偏好</span>
        </footer>
    </main>

    <script>
        const chartElement = document.getElementById('chart');
        const chart = echarts.init(chartElement, null, { renderer: 'svg' });
        const notice = document.getElementById('notice');
        const refreshButton = document.getElementById('refresh-button');
        const numberFormat = new Intl.NumberFormat('zh-CN');
        let currentData = null;

        function findLeader(tags, values) {
            if (!tags.length || !values.length) return { tag: '暂无数据', value: null };
            const maxValue = Math.max(...values);
            return { tag: tags[values.indexOf(maxValue)], value: maxValue };
        }

        function updateMetrics(data) {
            const maleLeader = findLeader(data.tags, data.male);
            const femaleLeader = findLeader(data.tags, data.female);
            document.getElementById('tag-count').innerHTML = `${data.tags.length}<span>个类型</span>`;
            document.getElementById('male-leader').innerHTML = maleLeader.value === null
                ? maleLeader.tag
                : `${maleLeader.tag}<span>${numberFormat.format(maleLeader.value)} 人</span>`;
            document.getElementById('female-leader').innerHTML = femaleLeader.value === null
                ? femaleLeader.tag
                : `${femaleLeader.tag}<span>${numberFormat.format(femaleLeader.value)} 人</span>`;
        }

        function chartOption(data) {
            const mobile = window.innerWidth <= 520;
            return {
                animationDuration: 650,
                animationEasing: 'cubicOut',
                color: ['#31594b', '#a4886d'],
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow', shadowStyle: { color: 'rgba(49, 89, 75, 0.045)' } },
                    backgroundColor: '#18231f',
                    borderWidth: 0,
                    padding: [11, 13],
                    textStyle: { color: '#ffffff', fontSize: 12 },
                    extraCssText: 'border-radius:10px;box-shadow:0 10px 30px rgba(24,35,31,.18);',
                    valueFormatter: value => `${numberFormat.format(value)} 人`
                },
                grid: mobile
                    ? { left: 78, right: 18, top: 26, bottom: 18, containLabel: false }
                    : { left: 24, right: 22, top: 30, bottom: 48, containLabel: true },
                xAxis: mobile ? {
                    type: 'value',
                    splitNumber: 3,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#8e9691', fontSize: 10, formatter: value => numberFormat.format(value) },
                    splitLine: { lineStyle: { color: '#edf0ec', type: 'dashed' } }
                } : {
                    type: 'category',
                    data: data.tags,
                    axisLine: { lineStyle: { color: '#dfe3de' } },
                    axisTick: { show: false },
                    axisLabel: { color: '#68716c', fontSize: 11, interval: 0, margin: 16 }
                },
                yAxis: mobile ? {
                    type: 'category',
                    data: data.tags,
                    inverse: true,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#68716c', fontSize: 11, width: 70, overflow: 'truncate' }
                } : {
                    type: 'value',
                    splitNumber: 4,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#8e9691', fontSize: 10, formatter: value => numberFormat.format(value) },
                    splitLine: { lineStyle: { color: '#edf0ec', type: 'dashed' } }
                },
                series: [
                    {
                        name: '男性',
                        type: 'bar',
                        data: data.male,
                        barMaxWidth: mobile ? 12 : 22,
                        barGap: '24%',
                        itemStyle: { color: '#31594b', borderRadius: mobile ? [0, 4, 4, 0] : [4, 4, 0, 0] },
                        emphasis: { itemStyle: { color: '#25483c' } }
                    },
                    {
                        name: '女性',
                        type: 'bar',
                        data: data.female,
                        barMaxWidth: mobile ? 12 : 22,
                        itemStyle: { color: '#a4886d', borderRadius: mobile ? [0, 4, 4, 0] : [4, 4, 0, 0] },
                        emphasis: { itemStyle: { color: '#8f745c' } }
                    }
                ]
            };
        }

        function renderChart(data) {
            currentData = data;
            chart.setOption(chartOption(data), true);
            updateMetrics(data);
        }

        async function loadGenderTags() {
            notice.classList.remove('error');
            notice.textContent = '正在同步数据';
            refreshButton.classList.add('loading');
            refreshButton.disabled = true;
            try {
                const response = await fetch('/api/gender-tags', { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                if (result.code !== 200) throw new Error(result.message || '接口返回异常');
                renderChart(result.data);
                notice.textContent = result.data.status === 'sample' ? '演示数据已就绪' : '实时结果已就绪';
            } catch (error) {
                notice.classList.add('error');
                notice.textContent = `加载失败 · ${error.message}`;
                chart.clear();
            } finally {
                refreshButton.classList.remove('loading');
                refreshButton.disabled = false;
            }
        }

        refreshButton.addEventListener('click', loadGenderTags);
        window.addEventListener('resize', () => {
            chart.resize();
            if (currentData) chart.setOption(chartOption(currentData), true);
        });
        loadGenderTags();
    </script>
</body>
</html>
